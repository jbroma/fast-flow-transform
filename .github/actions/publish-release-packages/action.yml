name: Publish Release Packages
description: Build and publish the release package set for a release.

inputs:
  publish-mode:
    description: Release mode, either stable or canary.
    required: true

runs:
  using: composite
  steps:
    - name: Set up workspace
      uses: ./.github/actions/setup-pr-ci

    - name: Configure npm registry for trusted publishing
      uses: actions/setup-node@v6
      with:
        node-version: 24
        registry-url: https://registry.npmjs.org

    - name: Apply canary version
      if: ${{ inputs.publish-mode == 'canary' }}
      run: node scripts/release/apply-release-version.mts --canary
      shell: bash

    - name: Regenerate binding package directories
      run: pnpm --dir packages/core exec napi create-npm-dirs --package-json-path package.json --npm-dir ../../bindings
      shell: bash

    - name: Attach downloaded artifacts to binding packages
      run: pnpm --dir packages/core exec napi artifacts --package-json-path package.json --npm-dir ../../bindings --output-dir ../../artifacts
      shell: bash

    - name: Publish release packages
      run: |
        cd packages/core
        if [ "${{ inputs.publish-mode }}" = "stable" ]; then
          npm publish --tag latest --access public
          exit 0
        fi

        npm publish --tag canary --access public
      shell: bash
