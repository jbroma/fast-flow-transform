name: Publish Release Packages
description: Build and publish the release package set for a release.

inputs:
  npm-token:
    description: Optional npm token for bootstrapping first-time package publishes.
    required: false
  publish-mode:
    description: Release mode, either stable or canary.
    required: true

outputs:
  release_version:
    description: Published stable version, if this was a stable release.
    value: ${{ steps.version.outputs.release_version }}

runs:
  using: composite
  steps:
    - name: Set up workspace
      uses: ./.github/actions/setup-pr-ci

    - name: Configure npm registry auth
      if: ${{ inputs.npm-token != '' }}
      env:
        NODE_AUTH_TOKEN: ${{ inputs.npm-token }}
      run: |
        cat > "$HOME/.npmrc" <<EOF
        registry=https://registry.npmjs.org/
        //registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}
        always-auth=true
        provenance=false
        EOF
        chmod 0600 "$HOME/.npmrc"
      shell: bash

    - name: Verify npm registry auth
      if: ${{ inputs.npm-token != '' }}
      run: npm whoami
      shell: bash

    - name: Apply canary version
      if: ${{ inputs.publish-mode == 'canary' }}
      run: node scripts/release/apply-release-version.mts --canary
      shell: bash

    - name: Read release version
      id: version
      run: |
        echo "release_version=$(node -p 'require(\"./packages/core/package.json\").version')" >> "$GITHUB_OUTPUT"
      shell: bash

    - name: Regenerate binding package directories
      run: pnpm --dir packages/core exec napi create-npm-dirs --package-json-path package.json --npm-dir ../../bindings
      shell: bash

    - name: Attach downloaded artifacts to binding packages
      run: pnpm --dir packages/core exec napi artifacts --package-json-path package.json --npm-dir ../../bindings --output-dir ../../artifacts
      shell: bash

    - name: Publish release packages for stable release
      if: ${{ inputs.publish-mode == 'stable' && inputs.npm-token == '' }}
      run: |
        cd packages/core
        npm publish --tag latest --access public
      shell: bash

    - name: Publish release packages for stable bootstrap
      if: ${{ inputs.publish-mode == 'stable' && inputs.npm-token != '' }}
      run: |
        cd packages/core
        npm publish --tag latest --access public
      shell: bash

    - name: Publish release packages for canary release
      if: ${{ inputs.publish-mode == 'canary' && inputs.npm-token == '' }}
      run: |
        cd packages/core
        npm publish --tag canary --access public
      shell: bash

    - name: Publish release packages for canary bootstrap
      if: ${{ inputs.publish-mode == 'canary' && inputs.npm-token != '' }}
      run: |
        cd packages/core
        npm publish --tag canary --access public
      shell: bash
