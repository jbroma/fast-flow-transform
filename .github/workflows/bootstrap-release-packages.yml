name: bootstrap-release-packages

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: Branch, tag, or exact commit SHA from this repository to bootstrap.
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: 0

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.target_ref || github.ref }}
  cancel-in-progress: false

jobs:
  prepare-bootstrap:
    name: prepare-bootstrap
    runs-on: ubuntu-24.04
    outputs:
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}

    steps:
      - name: Fail if NPM_TOKEN is missing
        env:
          BOOTSTRAP_NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$BOOTSTRAP_NPM_TOKEN" ]; then
            echo "Bootstrap publishing requires the NPM_TOKEN repository secret." >&2
            exit 1
          fi

      - name: Resolve bootstrap publish context
        id: resolve
        run: |
          echo "checkout_ref=${{ github.event.inputs.target_ref }}" >> "$GITHUB_OUTPUT"

  build-linux-artifacts:
    name: build-${{ matrix.name }}
    needs: prepare-bootstrap
    if: ${{ needs.prepare-bootstrap.result == 'success' }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64-gnu
            target: x86_64-unknown-linux-gnu
          - name: linux-arm64-gnu
            target: aarch64-unknown-linux-gnu
          - name: linux-x64-musl
            target: x86_64-unknown-linux-musl
          - name: linux-arm64-musl
            target: aarch64-unknown-linux-musl

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-bootstrap.outputs.checkout_ref }}
          submodules: recursive

      - name: Set up workspace
        uses: ./.github/actions/setup-pr-ci

      - name: Build ${{ matrix.name }} artifact
        uses: ./.github/actions/build-linux-native-artifact
        with:
          artifact-name: ${{ matrix.name }}
          target: ${{ matrix.target }}

  build-darwin-artifacts:
    name: build-${{ matrix.name }}
    needs: prepare-bootstrap
    if: ${{ needs.prepare-bootstrap.result == 'success' }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: darwin-x64
            target: x86_64-apple-darwin
          - name: darwin-arm64
            target: aarch64-apple-darwin

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-bootstrap.outputs.checkout_ref }}
          submodules: recursive

      - name: Set up workspace
        uses: ./.github/actions/setup-pr-ci

      - name: Build ${{ matrix.name }} artifact
        uses: ./.github/actions/build-darwin-native-artifact
        with:
          artifact-name: ${{ matrix.name }}
          target: ${{ matrix.target }}

  build-windows-artifacts:
    name: build-${{ matrix.name }}
    needs: prepare-bootstrap
    if: ${{ needs.prepare-bootstrap.result == 'success' }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: win32-x64-msvc
            target: x86_64-pc-windows-msvc
            generator_platform: x64
          - name: win32-arm64-msvc
            target: aarch64-pc-windows-msvc
            generator_platform: ARM64

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-bootstrap.outputs.checkout_ref }}
          submodules: recursive

      - name: Set up workspace
        uses: ./.github/actions/setup-pr-ci

      - name: Build ${{ matrix.name }} artifact
        uses: ./.github/actions/build-windows-native-artifact
        with:
          artifact-name: ${{ matrix.name }}
          generator-platform: ${{ matrix.generator_platform }}
          target: ${{ matrix.target }}

  bootstrap-release-packages:
    name: bootstrap-release-packages
    needs:
      - prepare-bootstrap
      - build-linux-artifacts
      - build-darwin-artifacts
      - build-windows-artifacts
    if: ${{ needs.prepare-bootstrap.result == 'success' }}
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare-bootstrap.outputs.checkout_ref }}
          submodules: recursive

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Bootstrap release packages
        uses: ./.github/actions/publish-release-packages
        with:
          npm-token: ${{ secrets.NPM_TOKEN }}
          publish-mode: canary
