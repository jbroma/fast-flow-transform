[tools]
node = "24"
pnpm = "10.29.2"
rust = "1.88.0"
cmake = "4.1.2"

[env]
HERMES_SOURCE_DIR = "{{config_root}}/hermes"

[tasks.rust-test]
description = "Run all Rust workspace tests"
run = "cargo test --workspace"

[tasks.rust-build]
description = "Build the Rust workspace in release mode"
run = "cargo build --workspace --release"

[tasks.rust-fmt]
description = "Format the Rust workspace with rustfmt"
run = "cargo fmt --all"

[tasks.rust-fmt-check]
description = "Check Rust workspace formatting with rustfmt"
run = "cargo fmt --all --check"
