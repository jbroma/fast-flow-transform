name: bootstrap-publish

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: Branch, tag, or exact commit SHA from this repository to bootstrap.
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  CARGO_INCREMENTAL: 0

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.target_ref || github.ref }}
  cancel-in-progress: false

jobs:
  prepare-bootstrap:
    name: prepare-bootstrap
    runs-on: ubuntu-24.04
    outputs:
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}

    steps:
      - name: Fail if NPM_TOKEN is missing
        env:
          BOOTSTRAP_NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$BOOTSTRAP_NPM_TOKEN" ]; then
            echo "Bootstrap publishing requires the NPM_TOKEN repository secret." >&2
            exit 1
          fi

      - name: Resolve bootstrap publish context
        id: resolve
        run: |
          echo "checkout_ref=${{ github.event.inputs.target_ref }}" >> "$GITHUB_OUTPUT"

  publish-linux-x64-binding:
    name: publish-linux-x64-binding
    needs: prepare-bootstrap
    if: ${{ needs.prepare-bootstrap.result == 'success' }}
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-bootstrap.outputs.checkout_ref }}
          submodules: recursive

      - name: Publish Linux x64 binding
        uses: ./.github/actions/publish-linux-bindings
        with:
          npm-token: ${{ secrets.NPM_TOKEN }}
          publish-mode: canary
          target: x86_64-unknown-linux-gnu

  publish-linux-arm64-binding:
    name: publish-linux-arm64-binding
    needs: prepare-bootstrap
    if: ${{ needs.prepare-bootstrap.result == 'success' }}
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-bootstrap.outputs.checkout_ref }}
          submodules: recursive

      - name: Publish Linux ARM64 binding
        uses: ./.github/actions/publish-linux-bindings
        with:
          npm-token: ${{ secrets.NPM_TOKEN }}
          publish-mode: canary
          target: aarch64-unknown-linux-gnu

  publish-windows-x64-binding:
    name: publish-windows-x64-binding
    needs: prepare-bootstrap
    if: ${{ needs.prepare-bootstrap.result == 'success' }}
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-bootstrap.outputs.checkout_ref }}
          submodules: recursive

      - name: Publish Windows x64 binding
        uses: ./.github/actions/publish-windows-bindings
        with:
          npm-token: ${{ secrets.NPM_TOKEN }}
          publish-mode: canary
          target: x86_64-pc-windows-msvc

  publish-windows-arm64-binding:
    name: publish-windows-arm64-binding
    needs: prepare-bootstrap
    if: ${{ needs.prepare-bootstrap.result == 'success' }}
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-bootstrap.outputs.checkout_ref }}
          submodules: recursive

      - name: Publish Windows ARM64 binding
        uses: ./.github/actions/publish-windows-bindings
        with:
          npm-token: ${{ secrets.NPM_TOKEN }}
          publish-mode: canary
          target: aarch64-pc-windows-msvc

  publish-macos-x64-binding:
    name: publish-macos-x64-binding
    needs: prepare-bootstrap
    if: ${{ needs.prepare-bootstrap.result == 'success' }}
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-bootstrap.outputs.checkout_ref }}
          submodules: recursive

      - name: Publish macOS x64 binding
        uses: ./.github/actions/publish-macos-bindings
        with:
          npm-token: ${{ secrets.NPM_TOKEN }}
          publish-mode: canary
          target: x86_64-apple-darwin

  publish-macos-arm64-binding:
    name: publish-macos-arm64-binding
    needs: prepare-bootstrap
    if: ${{ needs.prepare-bootstrap.result == 'success' }}
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-bootstrap.outputs.checkout_ref }}
          submodules: recursive

      - name: Publish macOS ARM64 binding
        uses: ./.github/actions/publish-macos-bindings
        with:
          npm-token: ${{ secrets.NPM_TOKEN }}
          publish-mode: canary
          target: aarch64-apple-darwin

  publish-package:
    name: publish-package
    needs:
      - prepare-bootstrap
      - publish-linux-x64-binding
      - publish-linux-arm64-binding
      - publish-windows-x64-binding
      - publish-windows-arm64-binding
      - publish-macos-x64-binding
      - publish-macos-arm64-binding
    if: ${{ needs.prepare-bootstrap.result == 'success' }}
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare-bootstrap.outputs.checkout_ref }}
          submodules: recursive

      - name: Publish main package
        uses: ./.github/actions/publish-main-package
        with:
          npm-token: ${{ secrets.NPM_TOKEN }}
          publish-mode: canary
