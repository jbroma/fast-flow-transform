name: Publish macOS Bindings
description: Build and publish the macOS binding packages for a release.

inputs:
  npm-token:
    description: Optional npm token for npm registry authentication.
    required: false
  publish-mode:
    description: Release mode, either stable or canary.
    required: true

runs:
  using: composite
  steps:
    - name: Set up workspace
      uses: ./.github/actions/setup-pr-ci

    - name: Apply canary version
      if: ${{ inputs.publish-mode == 'canary' }}
      run: node scripts/release/apply-release-version.mts --canary
      shell: bash

    - name: Update npm
      run: npm install --global npm@latest
      shell: bash

    - name: Configure npm auth
      if: ${{ inputs.npm-token != '' }}
      env:
        NPM_TOKEN: ${{ inputs.npm-token }}
      run: npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
      shell: bash

    - name: Install Rust targets
      run: rustup target add x86_64-apple-darwin aarch64-apple-darwin
      shell: bash

    - name: Build and publish macOS bindings
      env:
        CFLAGS_aarch64_apple_darwin: -arch arm64
        CMAKE_OSX_ARCHITECTURES: arm64
        CXXFLAGS_aarch64_apple_darwin: -arch arm64
      run: node scripts/release/publish-binding-package.mts --tag "${{ inputs.publish-mode == 'canary' && 'canary' || 'latest' }}" --target aarch64-apple-darwin
      shell: bash

    - name: Build and publish macOS x64 binding
      env:
        CFLAGS_x86_64_apple_darwin: -arch x86_64
        CMAKE_OSX_ARCHITECTURES: x86_64
        CXXFLAGS_x86_64_apple_darwin: -arch x86_64
      run: node scripts/release/publish-binding-package.mts --tag "${{ inputs.publish-mode == 'canary' && 'canary' || 'latest' }}" --target x86_64-apple-darwin
      shell: bash
