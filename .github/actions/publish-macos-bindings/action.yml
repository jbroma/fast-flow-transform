name: Publish macOS Bindings
description: Build and publish the macOS binding packages for a release.

inputs:
  npm-token:
    description: Optional npm token for npm registry authentication.
    required: false
  publish-mode:
    description: Release mode, either stable or canary.
    required: true
  target:
    description: Rust target triple for the macOS binding to publish.
    required: true

runs:
  using: composite
  steps:
    - name: Set up workspace
      uses: ./.github/actions/setup-pr-ci

    - name: Cache Rust artifacts
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: publish-bindings-${{ runner.os }}-${{ inputs.target }}

    - name: Apply canary version
      if: ${{ inputs.publish-mode == 'canary' }}
      run: node scripts/release/apply-release-version.mts --canary
      shell: bash

    - name: Update npm
      run: npm install --global npm@latest
      shell: bash

    - name: Configure npm auth
      if: ${{ inputs.npm-token != '' }}
      env:
        NPM_TOKEN: ${{ inputs.npm-token }}
      run: npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
      shell: bash

    - name: Install Rust targets
      run: rustup target add "${{ inputs.target }}"
      shell: bash

    - name: Build and publish macOS ARM64 binding
      if: ${{ inputs.target == 'aarch64-apple-darwin' }}
      env:
        CFLAGS_aarch64_apple_darwin: -arch arm64
        CMAKE_OSX_ARCHITECTURES: arm64
        CXXFLAGS_aarch64_apple_darwin: -arch arm64
      run: node scripts/release/publish-binding-package.mts --tag "${{ inputs.publish-mode == 'canary' && 'canary' || 'latest' }}" --target "${{ inputs.target }}"
      shell: bash

    - name: Build and publish macOS x64 binding
      if: ${{ inputs.target == 'x86_64-apple-darwin' }}
      env:
        CFLAGS_x86_64_apple_darwin: -arch x86_64
        CMAKE_OSX_ARCHITECTURES: x86_64
        CXXFLAGS_x86_64_apple_darwin: -arch x86_64
      run: node scripts/release/publish-binding-package.mts --tag "${{ inputs.publish-mode == 'canary' && 'canary' || 'latest' }}" --target "${{ inputs.target }}"
      shell: bash

    - name: Fail for unsupported macOS target
      if: ${{ inputs.target != 'aarch64-apple-darwin' && inputs.target != 'x86_64-apple-darwin' }}
      run: |
        echo "Unsupported macOS target: ${{ inputs.target }}" >&2
        exit 1
      shell: bash
