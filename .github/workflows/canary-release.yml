name: canary-release

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  request-canary:
    name: request-canary
    runs-on: ubuntu-24.04

    steps:
      - name: Fail if manual dispatch is not from a branch
        if: ${{ github.ref_type != 'branch' }}
        run: |
          echo "Manual canary publish must be dispatched from a repository branch." >&2
          exit 1

      - name: Confirm handoff to publish-release
        run: |
          echo "Canary publish requested for ${GITHUB_REF_NAME} at ${GITHUB_SHA}."
          echo "The trusted publish happens in the publish-release workflow."
