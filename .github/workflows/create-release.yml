name: create-release

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: prepare
    runs-on: ubuntu-24.04

    steps:
      - name: Fail if manual dispatch is not from main
        if: ${{ github.ref_name != 'main' }}
        run: |
          echo "create-release must be dispatched from main." >&2
          exit 1

      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Generate release changeset
        id: plan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_PR_BODY_PATH: ${{ runner.temp }}/release-pr-body.md
        run: node scripts/release/generate-release-changeset.mts

      - name: Stop when no release is needed
        if: ${{ steps.plan.outputs.should_release != 'true' }}
        run: echo "${{ steps.plan.outputs.release_reason }}"

      - name: Set up workspace
        if: ${{ steps.plan.outputs.should_release == 'true' }}
        uses: ./.github/actions/setup-pr-ci

      - name: Version release packages
        if: ${{ steps.plan.outputs.should_release == 'true' }}
        id: version
        run: |
          pnpm changeset version
          node scripts/release/apply-release-version.mts
          pnpm --dir packages/core exec napi create-npm-dirs --package-json-path package.json --npm-dir ../../bindings
          pnpm install --lockfile-only --ignore-scripts
          cargo update --workspace

      - name: Create or update release PR
        if: ${{ steps.plan.outputs.should_release == 'true' }}
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: |
            Cargo.lock
            crates/**/Cargo.toml
            bindings/**/README.md
            bindings/**/package.json
            packages/core/package.json
            pnpm-lock.yaml
          base: main
          body-path: ${{ runner.temp }}/release-pr-body.md
          branch: release/v${{ steps.version.outputs.release_version }}
          commit-message: 'release: prepare v${{ steps.version.outputs.release_version }}'
          delete-branch: true
          labels: 'release: ignore'
          title: 'release: v${{ steps.version.outputs.release_version }}'
