name: publish-release

on:
  pull_request_target:
    branches:
      - main
    types:
      - closed
  workflow_run:
    workflows:
      - canary-release
    types:
      - completed

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.workflow_run.id || github.ref }}
  cancel-in-progress: false

jobs:
  prepare-publish:
    name: prepare-publish
    if: ${{ (github.event_name == 'pull_request_target' && github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/v')) || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-24.04
    outputs:
      checkout_ref: ${{ steps.resolve_stable.outputs.checkout_ref || steps.resolve_canary.outputs.checkout_ref }}
      publish_mode: ${{ steps.resolve_stable.outputs.publish_mode || steps.resolve_canary.outputs.publish_mode }}

    steps:
      - name: Fail if release PR source is external
        if: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository }}
        run: |
          echo "Release publish is only allowed for refs originating from this repository." >&2
          exit 1

      - name: Fail if canary source is external
        if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_repository.full_name != github.repository }}
        run: |
          echo "Canary publish is only allowed for refs originating from this repository." >&2
          exit 1

      - name: Resolve stable publish context
        id: resolve_stable
        if: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name == github.repository }}
        run: |
          echo "checkout_ref=${{ github.event.pull_request.merge_commit_sha }}" >> "$GITHUB_OUTPUT"
          echo "publish_mode=stable" >> "$GITHUB_OUTPUT"

      - name: Resolve canary publish context
        id: resolve_canary
        if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_repository.full_name == github.repository }}
        run: |
          echo "checkout_ref=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          echo "publish_mode=canary" >> "$GITHUB_OUTPUT"

  publish-linux-bindings:
    name: publish-linux-bindings
    needs: prepare-publish
    if: ${{ needs.prepare-publish.result == 'success' }}
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-publish.outputs.checkout_ref }}
          submodules: recursive

      - name: Publish Linux bindings
        uses: ./.github/actions/publish-linux-bindings
        with:
          publish-mode: ${{ needs.prepare-publish.outputs.publish_mode }}

  publish-windows-bindings:
    name: publish-windows-bindings
    needs: prepare-publish
    if: ${{ needs.prepare-publish.result == 'success' }}
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-publish.outputs.checkout_ref }}
          submodules: recursive

      - name: Publish Windows bindings
        uses: ./.github/actions/publish-windows-bindings
        with:
          publish-mode: ${{ needs.prepare-publish.outputs.publish_mode }}

  publish-macos-bindings:
    name: publish-macos-bindings
    needs: prepare-publish
    if: ${{ needs.prepare-publish.result == 'success' }}
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-publish.outputs.checkout_ref }}
          submodules: recursive

      - name: Publish macOS bindings
        uses: ./.github/actions/publish-macos-bindings
        with:
          publish-mode: ${{ needs.prepare-publish.outputs.publish_mode }}

  publish-package:
    name: publish-package
    needs:
      - prepare-publish
      - publish-linux-bindings
      - publish-windows-bindings
      - publish-macos-bindings
    if: ${{ needs.prepare-publish.result == 'success' }}
    runs-on: ubuntu-24.04
    outputs:
      release_version: ${{ steps.publish.outputs.release_version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare-publish.outputs.checkout_ref }}
          submodules: recursive

      - name: Publish main package
        id: publish
        uses: ./.github/actions/publish-main-package
        with:
          publish-mode: ${{ needs.prepare-publish.outputs.publish_mode }}

  finalize-release:
    name: finalize-release
    needs:
      - prepare-publish
      - publish-package
    if: ${{ needs.prepare-publish.result == 'success' && needs.prepare-publish.outputs.publish_mode == 'stable' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare-publish.outputs.checkout_ref }}

      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/release/finalize-release.mts --version "${{ needs.publish-package.outputs.release_version }}"
