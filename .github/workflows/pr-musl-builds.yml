name: pr-musl-builds

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-linux-musl-artifacts:
    name: build-${{ matrix.name }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64-musl
            target: x86_64-unknown-linux-musl
          - name: linux-arm64-musl
            target: aarch64-unknown-linux-musl

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up PR CI
        uses: ./.github/actions/setup-pr-ci

      - name: Build ${{ matrix.name }} artifact
        uses: ./.github/actions/build-linux-native-artifact
        with:
          artifact-name: ${{ matrix.name }}
          target: ${{ matrix.target }}
