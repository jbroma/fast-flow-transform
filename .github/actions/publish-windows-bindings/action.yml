name: Publish Windows Bindings
description: Build and publish the Windows binding packages for a release.

inputs:
  publish-mode:
    description: Release mode, either stable or canary.
    required: true
  target:
    description: Rust target triple for the Windows binding to publish.
    required: true

runs:
  using: composite
  steps:
    - name: Set up workspace
      uses: ./.github/actions/setup-pr-ci

    - name: Cache Rust artifacts
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: publish-bindings-${{ runner.os }}-${{ inputs.target }}

    - name: Apply canary version
      if: ${{ inputs.publish-mode == 'canary' }}
      run: node scripts/release/apply-release-version.mts --canary
      shell: pwsh

    - name: Update npm
      run: npm install --global npm@latest
      shell: pwsh

    - name: Install Rust targets
      run: rustup target add "${{ inputs.target }}"
      shell: pwsh

    - name: Build and publish Windows x64 binding
      if: ${{ inputs.target == 'x86_64-pc-windows-msvc' }}
      env:
        CMAKE_GENERATOR: Visual Studio 17 2022
        CMAKE_GENERATOR_PLATFORM: x64
      run: node scripts/release/publish-binding-package.mts --tag "${{ inputs.publish-mode == 'canary' && 'canary' || 'latest' }}" --target "${{ inputs.target }}"
      shell: pwsh

    - name: Build and publish Windows ARM64 binding
      if: ${{ inputs.target == 'aarch64-pc-windows-msvc' }}
      env:
        CMAKE_GENERATOR: Visual Studio 17 2022
        CMAKE_GENERATOR_PLATFORM: ARM64
      run: node scripts/release/publish-binding-package.mts --tag "${{ inputs.publish-mode == 'canary' && 'canary' || 'latest' }}" --target "${{ inputs.target }}"
      shell: pwsh

    - name: Fail for unsupported Windows target
      if: ${{ inputs.target != 'x86_64-pc-windows-msvc' && inputs.target != 'aarch64-pc-windows-msvc' }}
      run: |
        Write-Error "Unsupported Windows target: ${{ inputs.target }}"
      shell: pwsh
