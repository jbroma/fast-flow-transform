name: publish-release

on:
  pull_request_target:
    branches:
      - main
    types:
      - closed
  workflow_dispatch:
    inputs:
      release_mode:
        description: Release mode to publish.
        required: true
        default: canary
        type: choice
        options:
          - canary
          - stable
      target_ref:
        description: Branch, tag, or exact commit SHA from this repository to publish.
        required: true
        type: string
      confirm_stable:
        description: Type publish-stable to allow a manual stable publish.
        required: false
        type: string

permissions:
  contents: read
  id-token: write

env:
  CARGO_INCREMENTAL: 0

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.inputs.release_mode || github.ref }}-${{ github.event.inputs.target_ref || github.ref }}
  cancel-in-progress: false

jobs:
  prepare-publish:
    name: prepare-publish
    if: ${{ (github.event_name == 'pull_request_target' && github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/v')) || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-24.04
    outputs:
      checkout_ref: ${{ steps.resolve_stable.outputs.checkout_ref || steps.resolve_manual.outputs.checkout_ref }}
      publish_mode: ${{ steps.resolve_stable.outputs.publish_mode || steps.resolve_manual.outputs.publish_mode }}

    steps:
      - name: Fail if release PR source is external
        if: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository }}
        run: |
          echo "Release publish is only allowed for refs originating from this repository." >&2
          exit 1

      - name: Fail if manual stable confirmation is missing
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_mode == 'stable' && github.event.inputs.confirm_stable != 'publish-stable' }}
        run: |
          echo "Manual stable publish requires confirm_stable=publish-stable." >&2
          exit 1

      - name: Resolve stable publish context
        id: resolve_stable
        if: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name == github.repository }}
        run: |
          echo "checkout_ref=${{ github.event.pull_request.merge_commit_sha }}" >> "$GITHUB_OUTPUT"
          echo "publish_mode=stable" >> "$GITHUB_OUTPUT"

      - name: Resolve manual publish context
        id: resolve_manual
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          echo "checkout_ref=${{ github.event.inputs.target_ref }}" >> "$GITHUB_OUTPUT"
          echo "publish_mode=${{ github.event.inputs.release_mode }}" >> "$GITHUB_OUTPUT"

  build-linux-artifacts:
    name: build-${{ matrix.name }}
    needs: prepare-publish
    if: ${{ needs.prepare-publish.result == 'success' }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64-gnu
            target: x86_64-unknown-linux-gnu
          - name: linux-arm64-gnu
            target: aarch64-unknown-linux-gnu
          - name: linux-x64-musl
            target: x86_64-unknown-linux-musl
          - name: linux-arm64-musl
            target: aarch64-unknown-linux-musl

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-publish.outputs.checkout_ref }}
          submodules: recursive

      - name: Set up workspace
        uses: ./.github/actions/setup-pr-ci

      - name: Build ${{ matrix.name }} artifact
        uses: ./.github/actions/build-linux-native-artifact
        with:
          artifact-name: ${{ matrix.name }}
          target: ${{ matrix.target }}

  build-darwin-artifacts:
    name: build-${{ matrix.name }}
    needs: prepare-publish
    if: ${{ needs.prepare-publish.result == 'success' }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: darwin-x64
            target: x86_64-apple-darwin
          - name: darwin-arm64
            target: aarch64-apple-darwin

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-publish.outputs.checkout_ref }}
          submodules: recursive

      - name: Set up workspace
        uses: ./.github/actions/setup-pr-ci

      - name: Build ${{ matrix.name }} artifact
        uses: ./.github/actions/build-darwin-native-artifact
        with:
          artifact-name: ${{ matrix.name }}
          target: ${{ matrix.target }}

  build-windows-artifacts:
    name: build-${{ matrix.name }}
    needs: prepare-publish
    if: ${{ needs.prepare-publish.result == 'success' }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: win32-x64-msvc
            target: x86_64-pc-windows-msvc
            generator_platform: x64
          - name: win32-arm64-msvc
            target: aarch64-pc-windows-msvc
            generator_platform: ARM64

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-publish.outputs.checkout_ref }}
          submodules: recursive

      - name: Set up workspace
        uses: ./.github/actions/setup-pr-ci

      - name: Build ${{ matrix.name }} artifact
        uses: ./.github/actions/build-windows-native-artifact
        with:
          artifact-name: ${{ matrix.name }}
          generator-platform: ${{ matrix.generator_platform }}
          target: ${{ matrix.target }}

  publish-release-packages:
    name: publish-release-packages
    needs:
      - prepare-publish
      - build-linux-artifacts
      - build-darwin-artifacts
      - build-windows-artifacts
    if: ${{ needs.prepare-publish.result == 'success' }}
    runs-on: ubuntu-24.04
    outputs:
      release_version: ${{ steps.publish.outputs.release_version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare-publish.outputs.checkout_ref }}
          submodules: recursive

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release packages
        id: publish
        uses: ./.github/actions/publish-release-packages
        with:
          publish-mode: ${{ needs.prepare-publish.outputs.publish_mode }}

  finalize-release:
    name: finalize-release
    needs:
      - prepare-publish
      - publish-release-packages
    if: ${{ needs.prepare-publish.result == 'success' && needs.prepare-publish.outputs.publish_mode == 'stable' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare-publish.outputs.checkout_ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/release/finalize-release.mts --version "${{ needs.publish-release-packages.outputs.release_version }}"
